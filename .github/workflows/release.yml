name: Release

on:
  release:
    types: [published]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: write
  pages: write

jobs:
  release:
    name: Publish to npm and GitHub Packages
    runs-on: ubuntu-latest
    outputs:
      next_version: ${{ steps.bump.outputs.next_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js (npm registry)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Read package version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to npm (OIDC trusted publisher, provenance auto)
        run: |
          set -euo pipefail
          VERSION="${{ steps.pkg.outputs.version }}"
          if npm view "iata-ssim@$VERSION" version >/dev/null 2>&1; then
            echo "iata-ssim@$VERSION already on npm — skipping."
          else
            pnpm publish --no-git-checks --access public
          fi

      - name: Publish to GitHub Packages as @skhrvg/iata-ssim
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.pkg.outputs.version }}"
          # Snapshot original state so we can roll back before pushing the bump.
          cp package.json package.json.bak
          cp .npmrc .npmrc.bak
          # Append scope + auth to project .npmrc (pnpm reads it automatically).
          # Quoted heredoc keeps ${NODE_AUTH_TOKEN} literal — npm/pnpm expands at read time.
          cat >> .npmrc <<'EOF'
          @skhrvg:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          EOF
          if npm view "@skhrvg/iata-ssim@$VERSION" version >/dev/null 2>&1; then
            echo "@skhrvg/iata-ssim@$VERSION already on GH Packages — skipping."
          else
            # Rename to scoped form for the GitHub Packages registry.
            node -e "const p=require('./package.json'); p.name='@skhrvg/iata-ssim'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');"
            pnpm publish --no-git-checks --access public
          fi
          # Restore original files so the bump step pushes a clean working tree.
          mv package.json.bak package.json
          mv .npmrc.bak .npmrc

      - name: Bump patch version and push to master
        id: bump
        run: |
          set -euo pipefail
          pnpm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "next_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to v${NEW_VERSION} [skip ci]"
          git push origin HEAD:master

  docs:
    name: Build and deploy docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: release
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout master (after bump)
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

      - name: Write CNAME for custom domain
        run: echo "iata-ssim.skhr.vg" > docs/.vitepress/dist/CNAME

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
